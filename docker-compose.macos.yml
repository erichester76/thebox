# ─────────────────────────────────────────────────────────────────────────────
# docker-compose.macos.yml — macOS (Docker Desktop) overlay for TheBox
# ─────────────────────────────────────────────────────────────────────────────
# The base docker-compose.yml already works on macOS Docker Desktop because
# the discovery, guardian, and honeypot services have no explicit `networks:`
# key in their service definitions and therefore join the default project
# network, where postgres and redis are also reachable.
#
# This overlay adds two macOS-specific refinements:
#
#   1. Honeypot port mappings — on Linux, network_mode: host binds ports
#      directly on the host interface.  On macOS the honeypot uses bridge
#      networking, so ports must be explicitly mapped to be reachable from
#      the Mac.
#
#   2. Honeypot network membership — connecting the honeypot to
#      thebox_external ensures it can be reached from outside Docker, and
#      connecting to thebox_internal lets it communicate with postgres/redis
#      by container name (in addition to the default project network).
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.macos.yml up -d
#
# The setup script (scripts/setup.sh) applies this overlay automatically
# when it detects macOS.
#
# ⚠  Limitation: ARP-based LAN scanning in the discovery service requires
#    direct access to the host's physical network interface.  On macOS Docker
#    Desktop, containers run inside a Linux VM and cannot reach the Mac's
#    physical LAN segment, so ARP sweeps will not discover real LAN devices.
#    All other services (dashboard, Pi-hole, PostgreSQL, Redis, honeypot)
#    work normally.
# ─────────────────────────────────────────────────────────────────────────────

services:
  honeypot:
    # Connect honeypot to named networks so it participates in Docker's
    # service-name DNS (thebox_internal) and is reachable externally (thebox_external).
    networks:
      - thebox_internal
      - thebox_external
    # Expose every honeypot listener port to the Mac host.
    # On Linux these are bound implicitly via network_mode: host.
    ports:
      - "21:21"
      - "22:22"
      - "23:23"
      - "25:25"
      - "80:80"
      - "110:110"
      - "143:143"
      - "443:443"
      - "445:445"
      - "3306:3306"
      - "3389:3389"
      - "8080:8080"
