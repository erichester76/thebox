# ─────────────────────────────────────────────────────────────────────────────
# docker-compose.macos.yml — macOS (Docker Desktop) overlay for TheBox
# ─────────────────────────────────────────────────────────────────────────────
# On macOS, Docker Desktop's network_mode: host does not expose Docker's
# embedded DNS (127.0.0.11) to host-mode containers, so service-name
# hostnames such as "postgres" and "redis" cannot be resolved.  To avoid
# this, the macOS overlay keeps all services on the default bridge network
# (where Docker DNS works correctly) and exposes the honeypot ports via
# explicit port mappings instead.
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.macos.yml up -d
#
# The setup script (scripts/setup.sh) applies this overlay automatically
# when it detects macOS.
#
# ⚠  Limitations on macOS:
#    • ARP sweeps (discovery): the Docker Desktop Linux VM's network
#      namespace is used, not the Mac's physical interface.  ARP packets
#      may not reach LAN devices depending on the VM's network attachment.
#      Discovery will start without errors but scanning real LAN hosts may
#      be limited.
#    • iptables/ipset (guardian): these are Linux kernel features that
#      apply to the Linux VM's network stack, not the Mac host.  Guardian
#      starts and manages database state normally, but rules will not
#      enforce quarantine on physical LAN devices.
#
# For full network enforcement capabilities, run TheBox on a dedicated
# Linux host (Raspberry Pi, mini-PC, VM, etc.) on your LAN.
# ─────────────────────────────────────────────────────────────────────────────

# Port mappings for the honeypot service are generated dynamically by
# scripts/setup.sh based on the HONEYPOT_PORTS variable in .env.
# Port 22 is always excluded on macOS because the system's built-in
# OpenSSH service already binds that port.
#
# The generated mappings are written to docker-compose.macos.ports.yml
# (gitignored) and merged into the compose command automatically.
# If you run docker compose directly without setup.sh, create
# docker-compose.macos.ports.yml manually or run setup.sh first.

services:
  honeypot: {}
