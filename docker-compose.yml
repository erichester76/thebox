services:
  # ─── Database ───────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: thebox-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-thebox}
      POSTGRES_USER: ${POSTGRES_USER:-thebox}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-thebox_secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./config/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - thebox_internal
      - default   # also on default so bridge-networked services (discovery, guardian, etc.) can reach it by name
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-thebox}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: thebox-redis
    restart: unless-stopped
    command: redis-server /etc/redis/redis.conf
    volumes:
      - redis_data:/data
      - ./config/redis/redis.conf:/etc/redis/redis.conf:ro
    networks:
      - thebox_internal
      - default   # also on default so bridge-networked services (discovery, guardian, etc.) can reach it by name
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── DNS / Ad-blocking (Pi-hole) ────────────────────────────────────────────
  pihole:
    image: pihole/pihole:latest
    container_name: thebox-pihole
    restart: unless-stopped
    ports:
      - "${PIHOLE_DNS_PORT:-53}:53/tcp"
      - "${PIHOLE_DNS_PORT:-53}:53/udp"
      - "${PIHOLE_WEB_PORT:-8080}:80/tcp"
    environment:
      TZ: ${TZ:-America/New_York}
      WEBPASSWORD: ${PIHOLE_PASSWORD:-thebox_pihole}
      # Pi-hole uses PIHOLE_DNS_ (trailing underscore) with semicolon-separated IPs
      PIHOLE_DNS_: "1.1.1.1;8.8.8.8"
      DNSMASQ_LISTENING: all
      VIRTUAL_HOST: pihole.thebox.local
    volumes:
      - ./config/pihole/etc-pihole:/etc/pihole
      - ./config/pihole/etc-dnsmasq.d:/etc/dnsmasq.d
    cap_add:
      - NET_ADMIN
      - SYS_TIME
      - SYS_NICE
    networks:
      - thebox_internal
      - thebox_external
    dns:
      - 127.0.0.1
      - 1.1.1.1

  # ─── Network Discovery Service ──────────────────────────────────────────────
  # No explicit networks: — uses the default project network on macOS/default,
  # allowing the service to reach postgres and redis by container name.
  # On Linux, docker-compose.linux.yml overrides this with network_mode: host
  # for full ARP scanning of the physical LAN; the DATABASE_URL and REDIS_URL
  # are also overridden there to use 127.0.0.1 (localhost) instead of
  # container-name hostnames, which are unreachable from host-mode containers.
  discovery:
    build:
      context: ./services/discovery
      dockerfile: Dockerfile
    container_name: thebox-discovery
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-thebox}:${POSTGRES_PASSWORD:-thebox_secret}@postgres:5432/${POSTGRES_DB:-thebox}
      REDIS_URL: redis://redis:6379/0
      SCAN_INTERVAL: ${SCAN_INTERVAL:-300}
      NETWORK_RANGES: ${NETWORK_RANGES:-192.168.1.0/24}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      PIHOLE_URL: ${PIHOLE_URL:-http://pihole:80}
      PIHOLE_PASSWORD: ${PIHOLE_PASSWORD:-thebox_pihole}
      DNS_SNIFF_ENABLED: ${DNS_SNIFF_ENABLED:-true}
      DNS_SNIFF_IFACE: ${DNS_SNIFF_IFACE:-}
      IOT_LEARNING_HOURS: ${IOT_LEARNING_HOURS:-48}
      PIHOLE_IOT_GROUP: ${PIHOLE_IOT_GROUP:-iot}
      DASHBOARD_URL: http://dashboard:3000
      SSDP_ENABLED: ${SSDP_ENABLED:-true}
      SSDP_TIMEOUT: ${SSDP_TIMEOUT:-5}
      MDNS_ENABLED: ${MDNS_ENABLED:-true}
      NETBIOS_ENABLED: ${NETBIOS_ENABLED:-true}
      BANNER_GRAB_ENABLED: ${BANNER_GRAB_ENABLED:-true}
      BANNER_GRAB_TIMEOUT: ${BANNER_GRAB_TIMEOUT:-3}
      SNIFF_PROCESS_INTERVAL: ${SNIFF_PROCESS_INTERVAL:-30}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./config/postgres/migrations:/app/migrations:ro
    cap_add:
      - NET_ADMIN
      - NET_RAW
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ─── Device Guardian (Quarantine + IoT Manager) ─────────────────────────────
  # No explicit networks: — uses the default project network on macOS/default.
  # On Linux, docker-compose.linux.yml overrides with network_mode: host for
  # full iptables/ipset enforcement on the physical LAN; DATABASE_URL and
  # REDIS_URL are overridden there to use 127.0.0.1.
  guardian:
    build:
      context: ./services/guardian
      dockerfile: Dockerfile
    container_name: thebox-guardian
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-thebox}:${POSTGRES_PASSWORD:-thebox_secret}@postgres:5432/${POSTGRES_DB:-thebox}
      REDIS_URL: redis://redis:6379/0
      QUARANTINE_VLAN: ${QUARANTINE_VLAN:-192.168.99.0/24}
      TRUSTED_NETWORKS: ${TRUSTED_NETWORKS:-192.168.1.0/24}
      AUTO_QUARANTINE: ${AUTO_QUARANTINE:-true}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      ALERT_EMAIL: ${ALERT_EMAIL:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_FROM: ${SMTP_FROM:-alerts@thebox.local}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_TLS: ${SMTP_TLS:-true}
      ALERT_WEBHOOK_URL: ${ALERT_WEBHOOK_URL:-}
    volumes:
      - ./config/postgres/migrations:/app/migrations:ro
    cap_add:
      - NET_ADMIN
      - NET_RAW
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      discovery:
        condition: service_started

  # ─── Honeypot Service ────────────────────────────────────────────────────────
  # No explicit networks: — uses the default project network on macOS/default.
  # On Linux, docker-compose.linux.yml overrides with network_mode: host;
  # DATABASE_URL and REDIS_URL are also overridden there to use 127.0.0.1.
  # On macOS, docker-compose.macos.yml adds explicit port mappings and network
  # membership so the honeypot ports are reachable from the Mac host.
  honeypot:
    build:
      context: ./services/honeypot
      dockerfile: Dockerfile
    container_name: thebox-honeypot
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-thebox}:${POSTGRES_PASSWORD:-thebox_secret}@postgres:5432/${POSTGRES_DB:-thebox}
      REDIS_URL: redis://redis:6379/0
      HONEYPOT_PORTS: ${HONEYPOT_PORTS:-21,22,23,25,53,80,110,135,143,389,443,445,1433,3306,3389,5432,5900,5985,6379,8080,8443,9200,11211,27017}
      HONEYPOT_IGNORED_NETWORKS: ${HONEYPOT_IGNORED_NETWORKS:-172.16.0.0/12,127.0.0.0/8}
      HONEYPOT_THRESHOLD_COUNT: ${HONEYPOT_THRESHOLD_COUNT:-3}
      HONEYPOT_THRESHOLD_WINDOW: ${HONEYPOT_THRESHOLD_WINDOW:-60}
      HONEYPOT_SWEEP_THRESHOLD: ${HONEYPOT_SWEEP_THRESHOLD:-4}
      HONEYPOT_SWEEP_WINDOW: ${HONEYPOT_SWEEP_WINDOW:-60}
      HONEYPOT_RECV_TIMEOUT: ${HONEYPOT_RECV_TIMEOUT:-4}
      HONEYPOT_MAX_PAYLOAD_LENGTH: ${HONEYPOT_MAX_PAYLOAD_LENGTH:-2000}
      HONEYPOT_CREDENTIAL_WINDOW_MULTIPLIER: ${HONEYPOT_CREDENTIAL_WINDOW_MULTIPLIER:-5}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      ALERT_EMAIL: ${ALERT_EMAIL:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_FROM: ${SMTP_FROM:-alerts@thebox.local}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_TLS: ${SMTP_TLS:-true}
      ALERT_WEBHOOK_URL: ${ALERT_WEBHOOK_URL:-}
    volumes:
      - ./config/postgres/migrations:/app/migrations:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ─── Redirector Service ─────────────────────────────────────────────────────
  # Redirects DNS and DHCP traffic to Pi-hole using increasingly intrusive
  # methods and enforces per-device quarantine via ARP spoofing.
  # On Linux, docker-compose.linux.yml overrides this with network_mode: host
  # for full ARP/iptables access to the physical LAN; DATABASE_URL and
  # REDIS_URL are also overridden there to use 127.0.0.1.
  redirector:
    build:
      context: ./services/redirector
      dockerfile: Dockerfile
    container_name: thebox-redirector
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-thebox}:${POSTGRES_PASSWORD:-thebox_secret}@postgres:5432/${POSTGRES_DB:-thebox}
      REDIS_URL: redis://redis:6379/0
      REDIRECT_MODE: ${REDIRECT_MODE:-passive}
      NETWORK_INTERFACE: ${NETWORK_INTERFACE:-eth0}
      GATEWAY_IP: ${GATEWAY_IP:-}
      NETWORK_RANGES: ${NETWORK_RANGES:-192.168.1.0/24}
      PIHOLE_IP: ${PIHOLE_IP:-}
      BOX_IP: ${BOX_IP:-}
      BLACKHOLE_QUARANTINED: ${BLACKHOLE_QUARANTINED:-false}
      ARP_REFRESH_INTERVAL: ${ARP_REFRESH_INTERVAL:-10}
      CAPTIVE_PORTAL_ENABLED: ${CAPTIVE_PORTAL_ENABLED:-true}
      CAPTIVE_PORTAL_PORT: ${CAPTIVE_PORTAL_PORT:-8082}
      CAPTIVE_PORTAL_MESSAGE: ${CAPTIVE_PORTAL_MESSAGE:-Your device has been quarantined because it was not recognized on this network.}
      CAPTIVE_PORTAL_CONTACT: ${CAPTIVE_PORTAL_CONTACT:-}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      ALERT_EMAIL: ${ALERT_EMAIL:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_FROM: ${SMTP_FROM:-alerts@thebox.local}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_TLS: ${SMTP_TLS:-true}
      ALERT_WEBHOOK_URL: ${ALERT_WEBHOOK_URL:-}
    volumes:
      - ./config/postgres/migrations:/app/migrations:ro
    cap_add:
      - NET_ADMIN
      - NET_RAW
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      guardian:
        condition: service_started

  # ─── Web Dashboard ───────────────────────────────────────────────────────────
  dashboard:
    build:
      context: ./services/dashboard
      dockerfile: Dockerfile
    container_name: thebox-dashboard
    restart: unless-stopped
    ports:
      - "${DASHBOARD_PORT:-3000}:3000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-thebox}:${POSTGRES_PASSWORD:-thebox_secret}@postgres:5432/${POSTGRES_DB:-thebox}
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-change_me_in_production}
      PIHOLE_URL: ${PIHOLE_URL:-http://pihole:80}
      PIHOLE_PASSWORD: ${PIHOLE_PASSWORD:-thebox_pihole}
      PIHOLE_SID_TTL: ${PIHOLE_SID_TTL:-240}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    volumes:
      - ./.env.example:/app/.env.example:ro
      - ./.env:/app/.env:ro
      - ./config/postgres/migrations:/app/migrations:ro
    networks:
      - thebox_internal
      - thebox_external
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

networks:
  thebox_internal:
    driver: bridge
    internal: true
  thebox_external:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
