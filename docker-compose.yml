services:
  # ─── Database ───────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: thebox-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-thebox}
      POSTGRES_USER: ${POSTGRES_USER:-thebox}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-thebox_secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./config/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - thebox_internal
      - default   # also on default so bridge-networked services (discovery, guardian, etc.) can reach it by name
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-thebox}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: thebox-redis
    restart: unless-stopped
    command: redis-server /etc/redis/redis.conf
    volumes:
      - redis_data:/data
      - ./config/redis/redis.conf:/etc/redis/redis.conf:ro
    networks:
      - thebox_internal
      - default   # also on default so bridge-networked services (discovery, guardian, etc.) can reach it by name
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── DNS / Ad-blocking (Pi-hole) ────────────────────────────────────────────
  pihole:
    image: pihole/pihole:latest
    container_name: thebox-pihole
    restart: unless-stopped
    ports:
      - "${PIHOLE_DNS_PORT:-53}:53/tcp"
      - "${PIHOLE_DNS_PORT:-53}:53/udp"
      - "${PIHOLE_WEB_PORT:-8080}:80/tcp"
    environment:
      TZ: ${TZ:-America/New_York}
      WEBPASSWORD: ${PIHOLE_PASSWORD:-thebox_pihole}
      # Pi-hole uses PIHOLE_DNS_ (trailing underscore) with semicolon-separated IPs
      PIHOLE_DNS_: "1.1.1.1;8.8.8.8"
      DNSMASQ_LISTENING: all
      VIRTUAL_HOST: pihole.thebox.local
    volumes:
      - ./config/pihole/etc-pihole:/etc/pihole
      - ./config/pihole/etc-dnsmasq.d:/etc/dnsmasq.d
    cap_add:
      - NET_ADMIN
      - SYS_TIME
      - SYS_NICE
    networks:
      - thebox_internal
      - thebox_external
    dns:
      - 127.0.0.1
      - 1.1.1.1

  # ─── Network Discovery Service ──────────────────────────────────────────────
  # No explicit networks: — uses the default project network on macOS/default,
  # allowing the service to reach postgres and redis by container name.
  # On Linux, docker-compose.linux.yml overrides this with network_mode: host
  # for full ARP scanning of the physical LAN; the DATABASE_URL and REDIS_URL
  # are also overridden there to use 127.0.0.1 (localhost) instead of
  # container-name hostnames, which are unreachable from host-mode containers.
  discovery:
    build:
      context: ./services/discovery
      dockerfile: Dockerfile
    container_name: thebox-discovery
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-thebox}:${POSTGRES_PASSWORD:-thebox_secret}@postgres:5432/${POSTGRES_DB:-thebox}
      REDIS_URL: redis://redis:6379/0
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./config/postgres/migrations:/app/migrations:ro
    cap_add:
      - NET_ADMIN
      - NET_RAW
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ─── Device Guardian (Quarantine + IoT Manager) ─────────────────────────────
  # No explicit networks: — uses the default project network on macOS/default.
  # On Linux, docker-compose.linux.yml overrides with network_mode: host for
  # full iptables/ipset enforcement on the physical LAN; DATABASE_URL and
  # REDIS_URL are overridden there to use 127.0.0.1.
  guardian:
    build:
      context: ./services/guardian
      dockerfile: Dockerfile
    container_name: thebox-guardian
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-thebox}:${POSTGRES_PASSWORD:-thebox_secret}@postgres:5432/${POSTGRES_DB:-thebox}
      REDIS_URL: redis://redis:6379/0
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    volumes:
      - ./config/postgres/migrations:/app/migrations:ro
    cap_add:
      - NET_ADMIN
      - NET_RAW
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      discovery:
        condition: service_started

  # ─── Honeypot Service ────────────────────────────────────────────────────────
  # No explicit networks: — uses the default project network on macOS/default.
  # On Linux, docker-compose.linux.yml overrides with network_mode: host;
  # DATABASE_URL and REDIS_URL are also overridden there to use 127.0.0.1.
  # On macOS, docker-compose.macos.yml adds explicit port mappings and network
  # membership so the honeypot ports are reachable from the Mac host.
  honeypot:
    build:
      context: ./services/honeypot
      dockerfile: Dockerfile
    container_name: thebox-honeypot
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-thebox}:${POSTGRES_PASSWORD:-thebox_secret}@postgres:5432/${POSTGRES_DB:-thebox}
      REDIS_URL: redis://redis:6379/0
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    volumes:
      - ./config/postgres/migrations:/app/migrations:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ─── Redirector Service ─────────────────────────────────────────────────────
  # Redirects DNS and DHCP traffic to Pi-hole using increasingly intrusive
  # methods and enforces per-device quarantine via ARP spoofing.
  # On Linux, docker-compose.linux.yml overrides this with network_mode: host
  # for full ARP/iptables access to the physical LAN; DATABASE_URL and
  # REDIS_URL are also overridden there to use 127.0.0.1.
  redirector:
    build:
      context: ./services/redirector
      dockerfile: Dockerfile
    container_name: thebox-redirector
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-thebox}:${POSTGRES_PASSWORD:-thebox_secret}@postgres:5432/${POSTGRES_DB:-thebox}
      REDIS_URL: redis://redis:6379/0
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    volumes:
      - ./config/postgres/migrations:/app/migrations:ro
    cap_add:
      - NET_ADMIN
      - NET_RAW
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      guardian:
        condition: service_started

  # ─── Web Dashboard ───────────────────────────────────────────────────────────
  dashboard:
    build:
      context: ./services/dashboard
      dockerfile: Dockerfile
    container_name: thebox-dashboard
    restart: unless-stopped
    ports:
      - "${DASHBOARD_PORT:-3000}:3000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-thebox}:${POSTGRES_PASSWORD:-thebox_secret}@postgres:5432/${POSTGRES_DB:-thebox}
      REDIS_URL: redis://redis:6379/0
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    volumes:
      - ./.env.example:/app/.env.example:ro
      - ./.env:/app/.env:ro
      - ./config/postgres/migrations:/app/migrations:ro
    networks:
      - thebox_internal
      - thebox_external
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

networks:
  thebox_internal:
    driver: bridge
    internal: true
  thebox_external:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
