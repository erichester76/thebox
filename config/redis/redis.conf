# Redis configuration for TheBox
bind 0.0.0.0
port 6379
# protected-mode is disabled because Redis is bound only to the internal Docker
# bridge network (thebox_internal) and is never exposed on the host. If you
# expose Redis externally, set protected-mode yes and add requirepass below.
protected-mode no

# Persistence
save 900 1
save 300 10
save 60 10000

# Memory policy: drop least-recently-used keys when memory is full
maxmemory 256mb
maxmemory-policy allkeys-lru

# Logging
loglevel notice
